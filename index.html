<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0500">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HENDSBEE">
<link rel="manifest" href="manifest.json">
<title>HENDSBEE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing:border-box; margin:0; padding:0; }

  html, body {
    width:100%; height:100%;
  }

  body {
    background:#0e0500;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace;
    overflow:hidden; image-rendering:pixelated;
    user-select:none;
  }

  #gw {
    position:relative; width:360px; height:680px; overflow:hidden;
    border:3px solid #d07800; outline:2px solid #4a2000;
    box-shadow:5px 5px 0 #280e00;
    transform-origin: 0 0;
    flex-shrink:0;
  }

  canvas {
    display:block; width:100%; height:100%;
    background:#0e0500; image-rendering:pixelated;
    touch-action:none;
  }

  /* ── overlays ─────────────────────────── */
  .panel {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.12s;
  }
  .panel.show { opacity:1; pointer-events:all; }

  #ov { background:transparent; }

  #ovTitle {
    font-size:1.1rem; color:#f0a020;
    text-shadow:3px 3px 0 #4a2000;
    letter-spacing:3px; margin-bottom:8px; text-align:center;
  }
  #ovSub {
    font-size:0.48rem; color:#7a5010;
    letter-spacing:1px; line-height:2.2;
    text-align:center; margin-bottom:24px;
  }

  .ob {
    font-family:'Press Start 2P',monospace; font-size:0.55rem;
    padding:8px 16px; border:2px solid #f0a020; outline:1px solid #6a3000;
    background:#120700; color:#f0a020; cursor:pointer;
    box-shadow:3px 3px 0 #4a2000; text-transform:uppercase;
    margin:3px 0; min-width:190px; text-align:center; display:block;
    transition:transform 0.05s, box-shadow 0.05s;
  }
  .ob:hover  { background:#281200; color:#ffc840; }
  .ob:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #4a2000; }
  .ob.pr { font-size:0.65rem; padding:10px 20px; border-width:3px; margin-bottom:8px; }

  /* ── power-up picker ──────────────────── */
  #pu {
    background:rgba(4,1,0,0.65);
    padding:20px 14px;
    gap:0;
  }
  #puTitle {
    font-size:0.75rem; color:#f0a020;
    text-shadow:2px 2px 0 #6a3000;
    letter-spacing:2px; margin-bottom:4px; text-align:center;
  }
  #puSub {
    font-size:0.42rem; color:#5a3800;
    margin-bottom:18px; letter-spacing:1px; text-align:center;
  }
  .puCard {
    width:300px; border:2px solid #4a2800; background:#160a00;
    margin:6px 0; padding:14px 14px 12px; cursor:pointer;
    font-family:'Press Start 2P',monospace;
    box-shadow:3px 3px 0 #200a00;
    transition:transform 0.06s, border-color 0.06s, background 0.06s;
    text-align:left;
  }
  .puCard:hover  { border-color:#f0a020; background:#221000; }
  .puCard:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #200a00; }
  .puName { font-size:0.60rem; color:#f0c020; margin-bottom:6px; }
  .puDesc { font-size:0.40rem; color:#7a5022; line-height:1.8; }
  .puTag  { font-size:0.36rem; color:#4a7a20; margin-top:5px; letter-spacing:1px; }

  /* ── run summary ──────────────────────── */
  #summary {
    background: rgba(4,1,0,0.97);
    padding: 18px 14px;
    gap: 0;
  }
  #sumTitle {
    font-size: 0.80rem; color: #f0a020;
    text-shadow: 2px 2px 0 #6a3000;
    letter-spacing: 2px; margin-bottom: 2px; text-align: center;
  }
  #sumLv {
    font-size: 0.42rem; color: #5a3800;
    letter-spacing: 1px; margin-bottom: 12px; text-align: center;
  }
  #sumCanvas {
    display: block; image-rendering: pixelated; margin-bottom: 14px;
  }

  /* ── pause / guide ──────────────────── */
  #pause {
    background:rgba(4,1,0,0.97);
    padding:10px 0 0 0;
    align-items:center;
    justify-content:flex-start;
  }
  #pauseTitle {
    font-size:0.75rem; color:#f0a020;
    text-shadow:2px 2px 0 #6a3000;
    letter-spacing:2px; margin-bottom:8px; text-align:center;
    flex-shrink:0;
  }
  #guideBody {
    flex:1; width:100%; overflow-y:auto; overflow-x:hidden;
    padding:0 12px 8px 12px; box-sizing:border-box;
  }
  .gsec-title {
    font-size:0.40rem; color:#f0a020; letter-spacing:2px;
    padding:10px 0 6px 0; text-align:left;
  }
  .gsec-divider {
    height:1px; background:#3a1e00; margin:10px 0;
  }

  /* Hex cell grid (2-column) */
  #tab-cells {
    display:grid; grid-template-columns:1fr 1fr; gap:0 8px;
  }
  .gc-row {
    display:flex; align-items:center; gap:6px;
    padding:5px 0; border-bottom:1px solid #221000;
  }
  .gc-hex { flex-shrink:0; }
  .gc-info { flex:1; min-width:0; }
  .gc-name { font-size:0.38rem; letter-spacing:0.3px; margin-bottom:2px; }
  .gc-note { font-size:0.27rem; color:#a07840; letter-spacing:0.2px; margin-bottom:2px; }
  .gc-stats { display:flex; gap:5px; }
  .gc-stat  { font-size:0.27rem; letter-spacing:0.2px; white-space:nowrap; }

  /* Power-up rows */
  .gp-row {
    display:flex; align-items:center; gap:10px;
    padding:7px 0; border-bottom:1px solid #221000;
  }
  .gp-icon { width:28px; height:28px; flex-shrink:0; }
  .gp-info { flex:1; }
  .gp-name { font-size:0.40rem; letter-spacing:0.5px; margin-bottom:3px; }
  .gp-desc { font-size:0.32rem; color:#a07840; letter-spacing:0.3px; }
  .gp-tag  { font-size:0.24rem; margin-top:1px; }

  /* Upgrade rows */
  .gu-row {
    display:flex; align-items:center; gap:10px;
    padding:7px 0; border-bottom:1px solid #221000;
  }
  .gu-icon { width:28px; height:28px; flex-shrink:0; }
  .gu-info { flex:1; }
  .gu-name { font-size:0.40rem; letter-spacing:0.5px; margin-bottom:3px; }
  .gu-desc { font-size:0.32rem; color:#a07840; letter-spacing:0.3px; }


  #sumContent {
    width: 300px;
    background: #0c0500;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .sum-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid #2e1800;
  }
  .sum-label {
    font-size: 0.40rem; color: #a07030; letter-spacing: 1px;
  }
  .sum-value {
    font-size: 0.50rem; color: #ffe050; letter-spacing: 1px;
  }
  .sum-section-title {
    font-size: 0.40rem; color: #a07030; letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .sum-upgrade {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; padding-bottom: 8px;
    border-bottom: 1px solid #1a0a00;
  }
  .sum-upgrade-hex {
    width: 18px; height: 18px; flex-shrink: 0;
  }
  .sum-upgrade-info { flex: 1; }
  .sum-upgrade-name {
    font-size: 0.42rem; letter-spacing: 1px; margin-bottom: 3px;
  }
  .sum-upgrade-tag {
    font-size: 0.34rem; color: #4a3010; letter-spacing: 1px;
  }
  .sum-upgrade-stack {
    font-size: 0.40rem; letter-spacing: 1px;
  }
  .sum-none {
    font-size: 0.38rem; color: #4a2e10; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .sum-footer {
    font-size: 0.34rem; color: #3a2010; text-align: center;
    letter-spacing: 1px; margin-top: 8px;
  }

  #guideBody::-webkit-scrollbar { width:2px; }
  #guideBody::-webkit-scrollbar-track { background:#0a0400; }
  #guideBody::-webkit-scrollbar-thumb { background:#3a1e00; }

  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
</style>
</head>
<body>
<div id="gw">
  <canvas id="c" width="360" height="680"></canvas>

  <div id="ov" class="panel">
    <div id="ovTitle">HENDSBEE</div>
    <div id="ovSub"></div>
  </div>

  <div id="pause" class="panel">
    <div id="pauseTitle">PAUSED</div>
    <div id="guideBody">
      <div class="gsec-title">CELLS</div>
      <div id="tab-cells"></div>
      <div class="gsec-divider"></div>
      <div class="gsec-title">POWER-UPS</div>
      <div id="tab-powers"></div>
      <div class="gsec-divider"></div>
      <div class="gsec-title">UPGRADES</div>
      <div id="tab-upgrades"></div>
    </div>
  </div>

  <div id="summary" class="panel">
    <div id="sumTitle">HIVE CLEARED</div>
    <div id="sumLv"></div>
    <div id="sumContent"></div>
  </div>

  <div id="pu" class="panel">
    <div id="puTitle">HONEY FULL</div>
    <div id="puSub">CHOOSE AN UPGRADE</div>
    <div id="puCards"></div>
  </div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CANVAS & LAYOUT
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 360;
const aspect = Math.max(1.5, Math.min(2.2, window.innerHeight / window.innerWidth));
const H = Math.round(W * aspect);
canvas.width  = W;
canvas.height = H;

// ── Full-screen scaling ──────────────────────────────
// Dynamically sizes canvas to fill the screen aspect ratio,
// then scales the wrapper to fit the viewport.
const gw = document.getElementById('gw');
gw.style.height = H + 'px';

function scaleToFit() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  gw.style.transform = `scale(${scale})`;
  gw.style.marginLeft = `${(vw - W * scale) / 2}px`;
  gw.style.marginTop  = `${(vh - H * scale) / 2}px`;
  // Hide decorative frame when game fills the viewport (mobile)
  const fills = (W * scale >= vw - 2) && (H * scale >= vh - 2);
  gw.style.borderColor  = fills ? 'transparent' : '';
  gw.style.outlineColor = fills ? 'transparent' : '';
  gw.style.boxShadow    = fills ? 'none' : '';
  document.body.style.display = 'block';
}

scaleToFit();
window.addEventListener('resize', scaleToFit);
screen.orientation && screen.orientation.addEventListener('change', scaleToFit);

const PLAY_BOTTOM = 0.825;               // fraction where play zone ends
const HUD_Y       = Math.round(H * PLAY_BOTTOM) + 2;   // ≈543
const PADDLE_Y    = Math.round(H * PLAY_BOTTOM) - 14;  // ≈527

// ═══════════════════════════════════════════════════════
// PALETTE
// ═══════════════════════════════════════════════════════
const PAL = {
  hexNorm:  ['#ffd060','#f5c030','#e8a010','#f0b428','#c87800'],
  hexThick: ['#8b5a00','#7a4800','#6b3a00'],
  hexBrood: ['#2e1c04','#3a2408','#46300c'],
  hexHoney: ['#ffe050','#ffd020','#ffea80','#ffe860','#ffc800'], // bright saturated gold
  hexWax:   ['#e8dfc0','#d8cf9e','#cfc28a','#e2d9b2'],          // pale waxy cream
  hexPortal: ['#9020d0','#7810b0','#b030f0','#6808a0'],          // vivid royal purple
  hexHeavy:       ['#8a6830','#7a5820','#6a4810','#5a3808'],    // dark bronze
  hexRoyal:       ['#d4af37','#c09830','#a88020','#906810'],    // rich gold
  hexAncient:     ['#4a6050','#3a5040','#2a4030','#1a3020'],    // dark moss
  hexTitan:       ['#3a3a50','#2a2a40','#1a1a30','#101020'],    // dark steel
  hexCharged:     ['#50d0ff','#30b0e0','#2090c0','#1070a0'],    // electric blue
  hexBomb:        ['#ff4020','#e03010','#c02000','#a01000'],     // fiery red
  hexUnbreakable: ['#505050','#404040','#303030','#202020'],     // grey stone
  hexLine:  '#7a3d00',
  hexCrack: '#2a1000',
  bg:       '#0e0500',
  honey:    '#f5c030',
};

// ═══════════════════════════════════════════════════════
// CONFIG — all tunable gameplay values in one place
// ═══════════════════════════════════════════════════════
const CONFIG = {
  // Physics
  BASE_SPD:             3.6,
  MAX_SPD:              9.0,
  MIN_AXIS:             1.0,
  BLEND_F:              0.15,   // 15% raw-centre blend in hex reflection
  WALL_FRICTION:        0.82,
  SPEED_GAIN_PER_HEX:   0.12,   // speed added per 4 hexes destroyed

  // Bee
  BEE_R:                5,      // collision radius (px)
  TRAIL_LEN:            55,     // trail history length

  // Hend (Paddle)
  HEND_SPEED:           520,    // keyboard speed (px/sec)
  HEND_COLL_H:          6,      // collision zone height (px)
  HEND_TOUCH_FOLLOW:    0.38,   // touch smooth-follow factor
  HEND_VEL_BOOST:       0.28,   // paddle-velocity transfer to bee
  HEND_SPD_GAIN:        0.005,  // speed boost per unit of paddle velocity
  HEND_ANGLE_SPREAD:    62,     // base deflection half-angle (degrees)

  // Hex
  HEX_R:                18,
  HEX_COLL_RATIO:       0.90,   // effective collision = HEX_R * ratio
  PORTAL_COOLDOWN:      22,     // frames before a bee can re-use a portal

  // Honey Meter
  METER_BASE:           30,     // base cap at LV1
  METER_LEVEL_SCALE:    1.075,  // exponential per-level growth
  METER_UPGRADE_SCALE:  1.20,   // +20% cap per upgrade picked
  METER_FAST_RESET_RATE:0.08,   // fast-reset discount as fraction of base
  METER_MIN_CAP:        20,     // absolute minimum meter cap

  // Cell interactions
  WAX_DAMAGE:           1,      // splash damage dealt to neighbours on wax death

  // Brood spawn
  BROOD_MIN_BEES:       2,      // minimum bees released from brood cell
  BROOD_RAND_EXTRA:     2,      // random(0..RAND_EXTRA-1) added on top
};

// ── Derived constants (computed once from CONFIG) ─────
const BALL_R     = CONFIG.BEE_R;                           // alias used in physics/rendering
const HEX_COLL_R = CONFIG.HEX_R * CONFIG.HEX_COLL_RATIO;  // effective hex collision radius

// ═══════════════════════════════════════════════════════
// AUDIO — procedural SFX via Web Audio API
// ═══════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function acResume() { if (AC.state === 'suspended') AC.resume(); }

// iOS Safari requires AC.resume() inside a direct user gesture handler.
function _iosUnlock() {
  acResume();
  if (music.el) { music.el.play().then(() => music.el.pause()).catch(()=>{}); }
  document.removeEventListener('touchstart', _iosUnlock, true);
  document.removeEventListener('click', _iosUnlock, true);
}
document.addEventListener('touchstart', _iosUnlock, true);
document.addEventListener('click', _iosUnlock, true);

function _tone(freq, type, vol, dur, freqEnd) {
  acResume();
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function _noise(vol, dur) {
  acResume();
  const buf = AC.createBuffer(1, Math.ceil(AC.sampleRate * dur), AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(), g = AC.createGain();
  src.buffer = buf; src.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  src.start(); src.stop(AC.currentTime + dur);
}

const sfx = {
  wall:   () => { _tone(160, 'sine',     0.10, 0.07); },
  paddle: () => { _tone(260, 'triangle', 0.22, 0.10); _tone(130, 'sine', 0.14, 0.08); },
  hit:    () => { _tone(360, 'square',   0.07, 0.04, 280); },
  normal: () => { _tone(400, 'square',   0.12, 0.08, 260); _noise(0.05, 0.05); },
  thick:  () => { _tone(120, 'sawtooth', 0.20, 0.20, 70);  _noise(0.12, 0.12); },
  brood:  () => { _tone(100, 'sawtooth', 0.22, 0.28, 55);  _tone(200, 'square', 0.10, 0.18, 150); },
  honey:  () => { _tone(700, 'sine', 0.18, 0.22, 950);     _tone(950, 'sine', 0.10, 0.18, 1200); },
  wax:    () => { _noise(0.20, 0.14); _tone(280, 'sawtooth', 0.10, 0.10, 180); },
  queen:  () => { [440,554,659,880].forEach((f,i) => setTimeout(() => _tone(f,'sine',0.16,0.38,f*1.6), i*45)); },
  teleport: () => { _tone(880,'sine',0.18,0.12,440); setTimeout(()=>_tone(440,'sine',0.18,0.18,880),120); },
  bomb:     () => { _noise(0.30,0.20); _tone(100,'sawtooth',0.25,0.30,40); },
  powerup:  () => { _tone(600,'sine',0.15,0.20); _tone(800,'sine',0.10,0.15); },
};

// ═══════════════════════════════════════════════════════
// MUSIC — single track with low-pass muffle filter
// ═══════════════════════════════════════════════════════
const MUSIC_PATHS = ['Music/ingame1.mp3', 'ingame1.mp3'];
const music = {
  el: null,       // Audio element
  source: null,   // MediaElementAudioSourceNode
  filter: null,   // BiquadFilterNode (lowpass)
  gain: null,     // GainNode
  playing: false,
  muffled: false,
  _fadeId: null,

  _init() {
    if (this.el) return;
    // Try each path; use first that doesn't immediately error
    this.el = new Audio(MUSIC_PATHS[0]);
    this.el.loop = true;
    let tried = 0;
    this.el.addEventListener('error', () => {
      tried++;
      if (tried < MUSIC_PATHS.length) { this.el.src = MUSIC_PATHS[tried]; }
    }, { once: false });
    // Route through Web Audio for filter control
    this.source = AC.createMediaElementSource(this.el);
    this.filter = AC.createBiquadFilter();
    this.filter.type = 'lowpass';
    this.filter.frequency.value = 22000;  // wide open = no muffle
    this.filter.Q.value = 0.7;
    this.gain = AC.createGain();
    this.gain.gain.value = 0.5;
    this.source.connect(this.filter);
    this.filter.connect(this.gain);
    this.gain.connect(AC.destination);
  },

  play() {
    acResume();
    this._init();
    if (!this.playing) {
      this.el.play().catch(() => {});
      this.playing = true;
    }
  },

  muffle() {
    if (!this.filter) return;
    this.muffled = true;
    // Fade filter cutoff down to 400Hz over 500ms for muffled sound
    this.filter.frequency.cancelScheduledValues(AC.currentTime);
    this.filter.frequency.setValueAtTime(this.filter.frequency.value, AC.currentTime);
    this.filter.frequency.exponentialRampToValueAtTime(400, AC.currentTime + 0.5);
  },

  unmuffle() {
    if (!this.filter) return;
    this.muffled = false;
    // Fade filter cutoff back to 22kHz over 400ms
    this.filter.frequency.cancelScheduledValues(AC.currentTime);
    this.filter.frequency.setValueAtTime(this.filter.frequency.value, AC.currentTime);
    this.filter.frequency.exponentialRampToValueAtTime(22000, AC.currentTime + 0.4);
  },

  stop() {
    if (this.el) { this.el.pause(); this.el.currentTime = 0; }
    this.playing = false;
    this.muffled = false;
    if (this.filter) this.filter.frequency.value = 22000;
  }
};

// ═══════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════
function getMaxSpd() { return Math.max(4.5, CONFIG.MAX_SPD); }

function normSpd(b, tgt) {
  if (Math.abs(b.vx) < CONFIG.MIN_AXIS) b.vx = CONFIG.MIN_AXIS * Math.sign(b.vx || 1);
  if (Math.abs(b.vy) < CONFIG.MIN_AXIS) b.vy = CONFIG.MIN_AXIS * Math.sign(b.vy || -1);
  const s = Math.hypot(b.vx, b.vy);
  if (!s) { b.vx = 0; b.vy = -tgt; return; }
  const t = Math.max(CONFIG.BASE_SPD, Math.min(tgt, getMaxSpd()));
  b.vx = b.vx / s * t;
  b.vy = b.vy / s * t;
}

// Hand sprite dimensions — defined early so getPW() can reference them
const HAND_W = 22, HAND_H = 14, HAND_PX = 2;

// ── Asset path resolver ─────────────────────────────────
// Tries local subfolder path first (dev), falls back to flat root path (GitHub Pages)
function loadImg(paths) {
  return new Promise(resolve => {
    let i = 0;
    function tryNext() {
      if (i >= paths.length) { resolve(null); return; }
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => { i++; tryNext(); };
      img.src = paths[i];
    }
    tryNext();
  });
}

// ── HEND PNG asset ──────────────────────────────────────
// Load HEND.png, crop to content, remove white BG, flip so thumb is on right
let hendCanvas = null;   // pre-processed canvas (flipped, cropped, transparent BG)
let hendAspect = 1.242;  // width/height ratio of hand content (467/376)
const HEND_SRC_CROP = { x: 278, y: 314, w: 467, h: 376 };

function loadHendImage() {

// ═══════════════════════════════════════════════════════
// HONEYPOT SPRITE LOADING — empty jar + honey fill mask
// ═══════════════════════════════════════════════════════
let honeyPotEmpty = null;    // canvas: cleaned empty jar
let honeyPotFill  = null;    // canvas: honey-only pixels extrapolated to 100%
let honeyFillTop  = 0;       // Y in sprite space where 100% fill starts
let honeyFillBot  = 0;       // Y in sprite space where fill bottom is

function loadHoneypotImages() {
  const names = ['Honey_Empty.png', 'Honey_20.png'];
  return Promise.all(names.map(n => loadImg(['Assets/Honeypot/' + n, n])
  )).then(([emptyImg, fillImg]) => {
    if (!emptyImg || !fillImg) return;
    const sz = emptyImg.naturalWidth; // 1024

    // Draw both to offscreen canvases
    const eCanvas = document.createElement('canvas');
    eCanvas.width = sz; eCanvas.height = sz;
    const eCtx = eCanvas.getContext('2d');
    eCtx.drawImage(emptyImg, 0, 0);
    const eData = eCtx.getImageData(0, 0, sz, sz);

    const fCanvas = document.createElement('canvas');
    fCanvas.width = sz; fCanvas.height = sz;
    const fCtx = fCanvas.getContext('2d');
    fCtx.drawImage(fillImg, 0, 0);
    const fData = fCtx.getImageData(0, 0, sz, sz);

    // Strip white backgrounds from empty
    const ed = eData.data;
    for (let i = 0; i < ed.length; i += 4) {
      if (ed[i] > 230 && ed[i+1] > 230 && ed[i+2] > 230) ed[i+3] = 0;
    }
    eCtx.putImageData(eData, 0, 0);
    honeyPotEmpty = eCanvas;

    // Diff: find honey-only pixels and their Y range
    const fd = fData.data;
    let minHY = sz, maxHY = 0;
    // Collect average honey color
    let hR = 0, hG = 0, hB = 0, hCount = 0;
    for (let i = 0; i < fd.length; i += 4) {
      // Strip white bg from fill image too
      if (fd[i] > 230 && fd[i+1] > 230 && fd[i+2] > 230) { fd[i+3] = 0; continue; }
      // Compare with empty: if significantly different, it's honey
      const dr = fd[i] - ed[i], dg = fd[i+1] - ed[i+1], db = fd[i+2] - ed[i+2];
      const dist = Math.sqrt(dr*dr + dg*dg + db*db);
      if (dist > 30 && fd[i+3] > 100) {
        const px = (i / 4) % sz;
        const py = Math.floor((i / 4) / sz);
        if (py < minHY) minHY = py;
        if (py > maxHY) maxHY = py;
        hR += fd[i]; hG += fd[i+1]; hB += fd[i+2];
        hCount++;
      }
    }

    if (hCount === 0) return;

    // Average honey color from the 20% reference
    hR = Math.round(hR / hCount);
    hG = Math.round(hG / hCount);
    hB = Math.round(hB / hCount);

    // Find actual jar interior by scanning the empty sprite center column
    // to locate the gap between lid and body (fillable region)
    const cx = Math.floor(sz / 2);
    let jarInteriorTop = -1, jarInteriorBot = -1;
    let lidFound = false;
    for (let y = 0; y < sz; y++) {
      const idx = (y * sz + cx) * 4;
      const opaque = ed[idx + 3] > 50;
      if (!lidFound && opaque) lidFound = true;
      if (lidFound && !opaque && jarInteriorTop === -1) jarInteriorTop = y;
    }
    for (let y = sz - 1; y >= 0; y--) {
      const idx = (y * sz + cx) * 4;
      if (ed[idx + 3] > 50) { jarInteriorBot = y; break; }
    }
    // Fillable region: from just below lid gap to jar bottom
    honeyFillTop = jarInteriorTop + 10; // slight inset below lid
    honeyFillBot = jarInteriorBot - 4;  // slight inset above bottom

    // Build the full honey fill canvas
    const hCanvas = document.createElement('canvas');
    hCanvas.width = sz; hCanvas.height = sz;
    const hCtx = hCanvas.getContext('2d');

    // Create gradient fill matching the honey color
    const grad = hCtx.createLinearGradient(0, honeyFillTop, 0, honeyFillBot);
    grad.addColorStop(0, `rgb(${Math.min(255,hR+40)},${Math.min(255,hG+20)},${hB})`);
    grad.addColorStop(0.3, `rgb(${hR},${hG},${hB})`);
    grad.addColorStop(1, `rgb(${Math.max(0,hR-30)},${Math.max(0,hG-30)},${Math.max(0,hB-10)})`);

    // Fill each row within the jar interior, staying inside glass walls
    for (let y = honeyFillTop; y <= honeyFillBot; y++) {
      // Scan row for jar interior: find leftmost and rightmost opaque pixels
      let left = -1, right = -1;
      for (let x = 0; x < sz; x++) {
        const idx = (y * sz + x) * 4;
        if (ed[idx + 3] > 50) {
          if (left === -1) left = x;
          right = x;
        }
      }
      if (left >= 0 && right > left) {
        hCtx.fillStyle = grad;
        hCtx.fillRect(left + 4, y, right - left - 8, 1);
      }
    }

    // Add a surface highlight at whatever Y the fill is clipped to (drawn at runtime)
    // Store the fill canvas
    honeyPotFill = hCanvas;
  });
}

function spawnPowerupDrop(wx, wy) {
  const type = TEMP_POWERUPS[Math.floor(Math.random() * TEMP_POWERUPS.length)];
  powerupDrops.push({ x: wx, y: wy, vy: -1.5, type, flash: 0 });

function deactivatePowerup() {
  activePowerup = null;
  honeySurgeFills = 0;
}

function activatePowerup(type, px, py) {
  sfx.powerup();
  if (type.duration > 0) {
    // Timed — replace any existing
    activePowerup = { id: type.id, name: type.name, color: type.color, ticksLeft: type.duration };
  } else if (type.duration === -1) {
    // Stored (HEND OF GOD)
    hasHendOfGod = true;
  }
  // Instant effects dispatched here
  switch (type.id) {
    case 'beeBee': { // Split bees
      const clones = [];
      for (const b of bees) {
        b.sizeScale *= 0.7;
        const nb = mkBee(b.x, b.y, -b.vx, b.vy, b.speed);
        nb.sizeScale = b.sizeScale;
        clones.push(nb);
      }
      bees.push(...clones);
      break;
    }
    case 'beeSus': { // Divine clear — kill up to 15 cells in densest cluster
      let bestH = null, bestCount = 0;
      for (const h of hexes) {
        if (h.dead || h.type === 'PORTAL' || h.type === 'UNBREAKABLE') continue;
        let cnt = 0;
        for (const n of hexes) {
          if (!n.dead && n !== h && Math.hypot(n.x - h.x, n.y - h.y) < HEX_R * 5) cnt++;
        }
        if (cnt > bestCount) { bestCount = cnt; bestH = h; }
      }
      if (bestH) {
        let killed = 0;
        const sorted = hexes.filter(h => !h.dead && h.type !== 'PORTAL' && h.type !== 'UNBREAKABLE')
          .sort((a, b) => Math.hypot(a.x - bestH.x, a.y - bestH.y) - Math.hypot(b.x - bestH.x, b.y - bestH.y));
        for (const h of sorted) {
          if (killed >= 15) break;
          if (Math.hypot(h.x - bestH.x, h.y - bestH.y) < HEX_R * 6) {
            h.dead = true; killed++;
            spawnParts(h.x, h.y, 8, ['#f0e8a0', '#fff8d0', '#ffffff']);
            const drops = CELL_TYPES[h.type]?.honey || 0;
            for (let i = 0; i < drops; i++) spawnDroplet(h.x, h.y);
          }
        }
        broodMsgs.push({ x: bestH.x, y: bestH.y - 12, life: 80, txt: 'DIVINE!' });
      }
      break;
    }
    case 'beeElzebub': { // Corrupt 5-8 cells to BOMB
      const eligible = hexes.filter(h => !h.dead && !['PORTAL','UNBREAKABLE','BOMB','CHARGED'].includes(h.type));
      const count = 5 + Math.floor(Math.random() * 4);
      for (let i = 0; i < Math.min(count, eligible.length); i++) {
        const idx = Math.floor(Math.random() * eligible.length);
        const h = eligible.splice(idx, 1)[0];
        h.type = 'BOMB'; h.hp = CELL_TYPES.BOMB.hp; h.flash = 12;
        spawnParts(h.x, h.y, 6, ['#800040', '#400020', '#200010']);
      }
      broodMsgs.push({ x: px || W / 2, y: (py || scrollY + H / 2) - 12, life: 70, txt: 'CORRUPTED!' });
      break;
    }
  }
  broodMsgs.push({ x: px || W / 2, y: (py || scrollY + H / 2) - 20, life: 70, txt: type.name + '!' });
}

// ─── Upgrade slot tracking ────────────────────────────
// Stores up to 6 unique upgrades chosen this run (one per upgrade type).
// Each entry: { id, stacks }. New stacks go into existing entry.
let upgradeSlots = [];   // max 7 unique upgrades (one per type)

function recordUpgrade(id) {
  const existing = upgradeSlots.find(s => s.id === id);
  if (existing) {
    existing.stacks++;
  } else if (upgradeSlots.length < ALL_POWERUPS.length) {
    upgradeSlots.push({ id, stacks: 1 });
  }
}

// Pick 2 distinct random power-ups that haven't hit their max stack
function pickTwo() {
  const pool = ALL_POWERUPS.filter(p => powers[p.id] < p.max);
  if (pool.length === 0) return [];
  if (pool.length === 1) return [pool[0]];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return [pool[0], pool[1]];
}

// ─── Power-up picker panel ────────────────────────────
const puPanel = document.getElementById('pu');
const puCards = document.getElementById('puCards');

let puResumeCallback = null;   // called after player picks

function showPicker(onDone) {
  puResumeCallback = onDone;
  const choices = pickTwo();
  puCards.innerHTML = '';

  if (choices.length === 0) {
    // Nothing available — just resume
    onDone();
    paused = false; lastTime = 0; loop();
    return;
  }

  document.getElementById('puSub').textContent =
    choices.length === 1 ? 'ONE UPGRADE AVAILABLE' : 'CHOOSE AN UPGRADE';

  for (const pu of choices) {
    const card = document.createElement('button');
    card.className = 'puCard';
    card.innerHTML =
      `<div class="puName">${pu.name}</div>` +
      `<div class="puDesc">${pu.desc.replace(/\n/g,'<br>')}</div>` +
      `<div class="puTag">${pu.tag}</div>`;
    card.onclick = () => {
      pu.apply();
      recordUpgrade(pu.id);
      hidePicker();
      if (puResumeCallback) puResumeCallback();
      // Resume game loop for speed-up transition
      paused = false;
      lastTime = 0;
      loop();
    };
    puCards.appendChild(card);
  }
  puPanel.classList.add('show');
}

function hidePicker() { puPanel.classList.remove('show'); }

// ═══════════════════════════════════════════════════════
// HONEY (fills meter; triggers power-up picker when full)
// ═══════════════════════════════════════════════════════
let totalHoney = 0;
let droplets = [];

function getMeterCap() {
  // Level scaling: LV1≈30, LV10≈61, LV20≈122
  const levelScale = Math.pow(CONFIG.METER_LEVEL_SCALE, currentLevel - 1);
  // Upgrade scaling: each upgrade picked adds ~20% more on top
  const upgradeScale = Math.pow(CONFIG.METER_UPGRADE_SCALE, upgradeCount);
  const base = Math.round(CONFIG.METER_BASE * levelScale * upgradeScale);
  return Math.max(CONFIG.METER_MIN_CAP, base);
}

function spawnDroplet(wx, wy) {
  // Convert world Y → screen Y once at spawn; x is unchanged (no horizontal scroll)
  const sy = wy - scrollY;
  const count = (activePowerup?.id === 'honeySurge') ? 2 : 1;
  for (let i = 0; i < count; i++) {
    droplets.push({ x:wx + (i ? (Math.random()-0.5)*6 : 0), y:sy, tx:JAR_CX, ty:JAR_BY + JAR_BH * 0.5, prog:0,
                    spd:0.022 + Math.random()*0.018 });
  }
}

function updateDroplets() {
  for (const d of droplets) {
    d.prog = Math.min(1, d.prog + d.spd);
    d.x += (d.tx - d.x) * d.prog * 0.18;
    d.y += (d.ty - d.y) * d.prog * 0.18;
    if (d.prog >= 0.98) { totalHoney++; levelHoneyEarned++; d.done = true; checkMeterFull(); }
  }
  droplets = droplets.filter(d => !d.done);
}

let pickerPending = false;
let paused = false;   // true while power-up picker is visible

// Smooth picker transition state
let timeScale = 1.0;            // 1 = normal speed, 0 = frozen
let blurAmount = 0;             // canvas blur in px (0–8)
let pickerTransition = null;    // 'slowing' | 'speeding' | null
let pickerResumeCallback = null;

function checkMeterFull() {
  if (pickerPending || paused || pickerTransition) return;
  if (totalHoney >= getMeterCap()) {
    // HONEY SURGE: track jar fills, end early at 2
    if (activePowerup?.id === 'honeySurge') {
      honeySurgeFills++;
      if (honeySurgeFills >= 2) deactivatePowerup();
    }
    pickerPending = true;
    totalHoney = 0;
    upgradeCount++;
    music.muffle();
    pickerTransition = 'slowing';
    pickerResumeCallback = () => {
      pickerPending = false;
      pickerTransition = 'speeding';
      music.unmuffle();
    };
  }
}

function drawDroplets() {
  ctx.fillStyle = '#f5d040';
  for (const d of droplets) {
    const sz = Math.max(2, Math.round(3 * (1 - d.prog * 0.5)));
    ctx.fillRect(Math.round(d.x)-1, Math.round(d.y)-1, sz, sz);
  }
}
