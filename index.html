    const col = TAG_C[p.tag] || '#f0c040';
    const icon = hexSVG('#120900', col, 1.5, 28,
      `<text x="0" y="4" text-anchor="middle" font-family="Press Start 2P,monospace" font-size="5" fill="${col}">${p.tag[0]}</text>`);
    return `<div class="gp-row">
      <div class="gp-icon">${icon}</div>
      <div class="gp-info">
        <div class="gp-name" style="color:${col}">${p.name}</div>
        <div class="gp-desc">${p.desc}</div>
        <div class="gp-tag" style="color:${col}99">${p.tag} · MAX ${p.max}</div>
      </div>
    </div>`;
  }).join('');

  // ── UPGRADES tab ────────────────────────────────────
  // Shows current run's active upgrades; if none yet, placeholder grid
  const upgradesEl = document.getElementById('tab-upgrades');
  function refreshUpgradesTab() {
    if (upgradeSlots.length === 0) {
      upgradesEl.innerHTML = `<div style="font-size:0.32rem;color:#a07840;text-align:center;padding:20px 0">NO UPGRADES YET<br><br><span style="font-size:0.26rem;color:#7a5828">EARN HONEY TO UNLOCK</span></div>`;
      return;
    }
    upgradesEl.innerHTML = upgradeSlots.map(slot => {
      const pu = ALL_POWERUPS.find(p => p.id === slot.id);
      const col = TAG_C[pu.tag] || '#f0c040';
      const icon = hexSVG('#120900', col, 1.5, 28,
        `<text x="0" y="4" text-anchor="middle" font-family="Press Start 2P,monospace" font-size="5" fill="${col}">${pu.tag[0]}</text>`);
      const badge = slot.stacks > 1 ? `<span style="color:${col}"> ×${slot.stacks}</span>` : '';
      return `<div class="gu-row">
        <div class="gu-icon">${icon}</div>
        <div class="gu-info">
          <div class="gu-name" style="color:${col}">${pu.name}${badge}</div>
          <div class="gu-desc">${pu.desc}</div>
        </div>
      </div>`;
    }).join('') + `<div style="font-size:0.27rem;color:#2e1800;text-align:center;padding:8px 0">UPGRADES CARRY FORWARD</div>`;
  }
  refreshUpgradesTab();
  // Re-render upgrades tab each time pause opens
  pausePanel._refreshUpgrades = refreshUpgradesTab;
}

buildGuide();

function showPause() {
  if (pausePanel._refreshUpgrades) pausePanel._refreshUpgrades();
  document.getElementById('guideBody').scrollTop = 0;
  pausePanel.classList.add('show');
}
function hidePause() { pausePanel.classList.remove('show'); }

// Add a RESUME button to the pause panel (built once)
;(function() {
  const rb = document.createElement('button');
  rb.className = 'ob pr';
  rb.textContent = 'RESUME';
  rb.onclick = () => {
    hidePause();
    if (!gameOver && !pickerPending) {
      startCountdown(() => loop());
    }
  };
  pausePanel.appendChild(rb);

  const db = document.createElement('button');
  db.className = 'ob';
  db.textContent = 'DEV';
  db.onclick = () => { hidePause(); showDevMenu(!gameOver && bees.length > 0); };
  pausePanel.appendChild(db);
})();
const ov      = document.getElementById('ov');
const ovTitle = document.getElementById('ovTitle');
const ovSub   = document.getElementById('ovSub');

function clearBtns() { ov.querySelectorAll('.ob').forEach(b=>b.remove()); }
function mkBtn(lbl,pr,cb) {
  const b=document.createElement('button');
  b.className='ob'+(pr?' pr':'');
  b.textContent=lbl; b.onclick=cb;
  ov.appendChild(b);
}
function showOv()  { ov.classList.add('show'); }
function hideOv()  { ov.classList.remove('show'); }

function showMenu() {
  ovTitle.textContent='HENDSBEE';
  ovSub.innerHTML='BOUNCE THE BEE.<br>CLEAR THE HIVE.';
  clearBtns();
  mkBtn('PLAY',     true,  ()=>{hideOv();resetRun();startLevel(1);});
  mkBtn('GUIDE',    false, ()=>{showPause();});
  mkBtn('SETTINGS', false, ()=>{});
  mkBtn('DEV',      false, ()=>{showDevMenu();});
  showOv();
}

function showLose() {
  ovTitle.textContent='PLAY AGAIN';
  ovSub.innerHTML='LEVEL '+currentLevel;
  clearBtns();
  mkBtn('PLAY AGAIN',   true,  ()=>{hideOv();startLevel(currentLevel);});
  mkBtn('QUIT TO MENU', false, ()=>{hideOv();showMenu();});
  mkBtn('GUIDE',        false, ()=>{showPause();});
  mkBtn('SETTINGS',     false, ()=>{});
  showOv();
}

function showWin() {
  // Show the run summary panel; player continues from there
  showSummary();
}

// ESC to pause mid-game / close pause panel
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (pausePanel.classList.contains('show')) {
      hidePause();
      if (!gameOver && !pickerPending) {
        startCountdown(() => loop());
      }
    } else if (!gameOver && !pickerPending && animId) {
      paused = true;
      showPause();
    }
  }
});

// ═══════════════════════════════════════════════════════
// DEV MENU
// ═══════════════════════════════════════════════════════
const devPanel = document.getElementById('devmenu');
const devBody  = document.getElementById('devBody');
let devLvTarget = 1;
let devMenuFromGame = false; // true when opened mid-game from pause screen

function buildDevMenu() {
  devBody.innerHTML = '';

  // ── Level picker ─────────────────────────
  const row = document.createElement('div');
  row.className = 'devRow';

  const minus = document.createElement('button');
  minus.className = 'ob'; minus.textContent = '−'; minus.style.minWidth = '40px';

  const lbl = document.createElement('div');
  lbl.className = 'devLvLabel';
  lbl.textContent = devLvTarget;

  const plus = document.createElement('button');
  plus.className = 'ob'; plus.textContent = '+'; plus.style.minWidth = '40px';

  minus.onclick = () => { devLvTarget = Math.max(1,  devLvTarget-1); lbl.textContent = devLvTarget; };
  plus.onclick  = () => { devLvTarget = Math.min(99, devLvTarget+1); lbl.textContent = devLvTarget; };

  row.appendChild(minus); row.appendChild(lbl); row.appendChild(plus);
  devBody.appendChild(row);

  // ── Jump button ──────────────────────────
  const jumpBtn = document.createElement('button');
  jumpBtn.className = 'ob pr'; jumpBtn.textContent = 'JUMP TO LEVEL';
  jumpBtn.style.borderColor = '#30e060'; jumpBtn.style.color = '#30e060';
  jumpBtn.onclick = () => { hideDevMenu(); resetRun(); startLevel(devLvTarget); };
  devBody.appendChild(jumpBtn);

  // ── Clear level ──────────────────────────
  const clearBtn = document.createElement('button');
  clearBtn.className = 'ob'; clearBtn.textContent = 'CLEAR LEVEL';
  clearBtn.style.borderColor = '#e06030'; clearBtn.style.color = '#e06030';
  clearBtn.onclick = () => {
    hideDevMenu();
    if (!gameOver) { hexes.forEach(h => h.dead = true); }
    if (!gameOver && !pickerPending) { paused = false; loop(); }
  };
  devBody.appendChild(clearBtn);

  // ── Close ────────────────────────────────
  const closeBtn = document.createElement('button');
  closeBtn.className = 'ob'; closeBtn.textContent = 'CLOSE';
  closeBtn.onclick = () => {
    hideDevMenu();
    if (devMenuFromGame && !gameOver && !pickerPending) {
      startCountdown(() => loop());
    }
    // if opened from main menu, do nothing — showMenu() overlay is still visible
  };
  devBody.appendChild(closeBtn);
}

function showDevMenu(fromGame = false) {
  devMenuFromGame = fromGame;
  paused = true;
  buildDevMenu();
  devPanel.classList.add('show');
}
function hideDevMenu() { devPanel.classList.remove('show'); }

function startCountdown(cb) {
  paused = true;
  let count = 3;
  function tick() {
    render();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = '64px "Press Start 2P",monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#f5c030';
    ctx.fillText(String(count), W/2, H/2 + 20);
    ctx.textAlign = 'left';
    count--;
    if (count >= 0) {
      setTimeout(tick, 800);
    } else {
      paused = false;
      lastTime = 0;
      cb();
    }
  }
  tick();
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
ctx.fillStyle=PAL.bg; ctx.fillRect(0,0,W,H);
showMenu();
</script>
<script>
if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', e => e.waitUntil(
      caches.open('hendsball-v1').then(c => c.addAll([location.href]))
    ));
    self.addEventListener('fetch', e => e.respondWith(
      caches.match(e.request).then(r => r || fetch(e.request))
    ));
  `;
  const blob = new Blob([sw], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
