<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080300">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HENDSBEE">
<link rel="manifest" href="manifest.json">
<title>HENDSBEE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { box-sizing:border-box; margin:0; padding:0; }

  html, body {
    width:100%; height:100%;
  }

  body {
    background:#080300;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Press Start 2P',monospace;
    overflow:hidden; image-rendering:pixelated;
    user-select:none;
  }

  #gw {
    position:relative; width:360px; height:680px; overflow:hidden;
    border:3px solid #d07800; outline:2px solid #4a2000;
    box-shadow:5px 5px 0 #280e00;
    transform-origin: 0 0;
    flex-shrink:0;
  }

  canvas {
    display:block; width:100%; height:100%;
    background:#080300; image-rendering:pixelated;
    touch-action:none;
  }

  /* ── overlays ─────────────────────────── */
  .panel {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.12s;
  }
  .panel.show { opacity:1; pointer-events:all; }

  #ov { background:transparent; }
  #settingsPanel { background:#0e0500; }
  #shopPanel { background:#0e0500; }
  #shopBody {
    flex:1; width:100%; overflow-y:auto; overflow-x:hidden;
    padding:0 12px 8px 12px; box-sizing:border-box;
  }
  #shopBody::-webkit-scrollbar { width:2px; }
  #shopBody::-webkit-scrollbar-track { background:#0a0400; }
  #shopBody::-webkit-scrollbar-thumb { background:#3a1e00; }
  .shop-dots {
    display:flex; gap:6px; justify-content:center;
    flex-wrap:wrap; padding:2px 8px 8px 8px;
  }
  .shop-dot {
    width:16px; height:16px; border-radius:50%;
    border:2px solid #604020; cursor:pointer;
    transition:border-color 0.12s, transform 0.1s;
  }
  .shop-dot:hover { transform:scale(1.2); }
  .shop-dot.active { border-color:#f5d040; box-shadow:0 0 4px rgba(245,208,64,0.5); }
  .shop-dot-label {
    font-family:'Press Start 2P',monospace;
    font-size:0.28rem; color:#806030; text-align:center;
    letter-spacing:1px; padding:2px 0 1px 0;
  }
  .shop-hand-btn {
    font-family:'Press Start 2P',monospace; font-size:0.32rem;
    padding:3px 12px; border-radius:4px; cursor:pointer;
    border:1.5px solid #604020; background:rgba(240,160,32,0.08);
    color:#806030; transition:all 0.12s;
  }
  .shop-hand-btn.active {
    border-color:#f0a020; background:rgba(240,160,32,0.25);
    color:#f0a020;
  }

  #ovTitle {
    font-size:1.1rem; color:#f0a020;
    text-shadow:3px 3px 0 #4a2000;
    letter-spacing:3px; margin-bottom:8px; text-align:center;
  }
  #ovSub {
    font-size:0.48rem; color:#7a5010;
    letter-spacing:1px; line-height:2.2;
    text-align:center; margin-bottom:24px;
  }

  .ob {
    font-family:'Press Start 2P',monospace; font-size:0.55rem;
    padding:8px 16px; border:2px solid #f0a020; outline:1px solid #6a3000;
    background:#120700; color:#f0a020; cursor:pointer;
    box-shadow:3px 3px 0 #4a2000; text-transform:uppercase;
    margin:3px 0; min-width:190px; text-align:center; display:block;
    transition:transform 0.05s, box-shadow 0.05s;
  }
  .ob:hover  { background:#281200; color:#ffc840; }
  .ob:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #4a2000; }
  .ob.pr { font-size:0.65rem; padding:10px 20px; border-width:3px; margin-bottom:8px; }

  /* ── power-up picker ──────────────────── */
  #pu {
    background:rgba(4,1,0,0.65);
    padding:20px 14px;
    gap:0;
  }
  #puTitle {
    font-size:0.75rem; color:#f0a020;
    text-shadow:2px 2px 0 #6a3000;
    letter-spacing:2px; margin-bottom:4px; text-align:center;
  }
  #puSub {
    font-size:0.42rem; color:#5a3800;
    margin-bottom:18px; letter-spacing:1px; text-align:center;
  }
  .puCard {
    width:300px; border:2px solid #4a2800; background:#160a00;
    margin:6px 0; padding:14px 14px 12px; cursor:pointer;
    font-family:'Press Start 2P',monospace;
    box-shadow:3px 3px 0 #200a00;
    transition:transform 0.06s, border-color 0.06s, background 0.06s;
    text-align:left;
  }
  .puCard:hover  { border-color:#f0a020; background:#221000; }
  .puCard:active { transform:translate(2px,2px); box-shadow:1px 1px 0 #200a00; }
  .puName { font-size:0.60rem; color:#f0c020; margin-bottom:6px; }
  .puDesc { font-size:0.40rem; color:#7a5022; line-height:1.8; }
  /* puTag removed — category labels no longer shown */

  /* ── run summary ──────────────────────── */
  #summary {
    background: rgba(4,1,0,0.97);
    padding: 18px 14px;
    gap: 0;
  }
  #sumTitle {
    font-size: 0.80rem; color: #f0a020;
    text-shadow: 2px 2px 0 #6a3000;
    letter-spacing: 2px; margin-bottom: 2px; text-align: center;
  }
  #sumLv {
    font-size: 0.42rem; color: #5a3800;
    letter-spacing: 1px; margin-bottom: 12px; text-align: center;
  }
  #sumCanvas {
    display: block; image-rendering: pixelated; margin-bottom: 14px;
  }

  /* ── pause / guide ──────────────────── */
  #pause {
    background:#040100;
    padding:10px 0 0 0;
    align-items:center;
  }
  #pauseBtns .ob { margin-left:auto; margin-right:auto; }
  #pauseTitle {
    font-size:0.75rem; color:#f0a020;
    text-shadow:2px 2px 0 #6a3000;
    letter-spacing:2px; margin-bottom:8px; text-align:center;
    flex-shrink:0;
  }
  #guideBody {
    flex:1; width:100%; overflow-y:auto; overflow-x:hidden;
    padding:0 12px 8px 12px; box-sizing:border-box;
  }
  .gsec-title {
    font-size:0.55rem; color:#f0a020; letter-spacing:2px;
    padding:8px 0 4px 0; text-align:left;
  }
  .gsec-divider {
    height:1px; background:#3a1e00; margin:6px 0;
  }

  /* Hex cell grid (2-column) */
  #tab-cells {
    display:grid; grid-template-columns:1fr 1fr; gap:0 6px;
  }
  .gc-row {
    display:flex; align-items:center; gap:5px;
    padding:4px 2px;
  }
  .gc-hex { flex-shrink:0; }
  .gc-info { flex:1; min-width:0; }
  .gc-name { font-size:0.50rem; letter-spacing:0.3px; margin-bottom:1px; }
  .gc-note { font-size:0.36rem; color:#907040; letter-spacing:0.2px; margin-bottom:2px; }
  .gc-stats { font-size:0.38rem; color:#c8a060; letter-spacing:0.3px; white-space:nowrap; }
  .gc-queen-row {
    grid-column: 1 / -1;
    display:flex; align-items:center; gap:8px;
    padding:6px 4px; margin-top:4px;
    border-top:1px solid #2e1800;
  }

  /* Power-up rows */
  .gp-row {
    display:flex; align-items:center; gap:8px;
    padding:4px 4px; border-bottom:1px solid #221000;
  }
  .gp-icon { width:32px; height:32px; flex-shrink:0; }
  .gp-info { flex:1; }
  .gp-name { font-size:0.55rem; letter-spacing:0.5px; margin-bottom:2px; }
  .gp-desc { font-size:0.38rem; color:#c09050; letter-spacing:0.3px; line-height:1.5; }
  .gp-tag  { font-size:0.32rem; margin-top:1px; }
  .gp-preview { width:40px; height:40px; flex-shrink:0; image-rendering:pixelated; }

  /* Upgrade rows */
  .gu-row {
    display:flex; align-items:center; gap:8px;
    padding:4px 4px; border-bottom:1px solid #221000;
  }
  .gu-icon { width:32px; height:32px; flex-shrink:0; }
  .gu-info { flex:1; }
  .gu-name { font-size:0.55rem; letter-spacing:0.5px; margin-bottom:2px; }
  .gu-desc { font-size:0.42rem; color:#c09050; letter-spacing:0.3px; }
  .gu-count { font-size:0.6rem; letter-spacing:0.5px; flex-shrink:0; text-align:right; min-width:40px; align-self:center; padding-right:4px; }


  #sumContent {
    width: 300px;
    background: #0c0500;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .sum-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid #2e1800;
  }
  .sum-label {
    font-size: 0.40rem; color: #a07030; letter-spacing: 1px;
  }
  .sum-value {
    font-size: 0.50rem; color: #ffe050; letter-spacing: 1px;
  }
  .sum-section-title {
    font-size: 0.40rem; color: #a07030; letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .sum-upgrade {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px; padding-bottom: 8px;
    border-bottom: 1px solid #1a0a00;
  }
  .sum-upgrade-hex {
    width: 18px; height: 18px; flex-shrink: 0;
  }
  .sum-upgrade-info { flex: 1; }
  .sum-upgrade-name {
    font-size: 0.42rem; letter-spacing: 1px; margin-bottom: 3px;
  }
  .sum-upgrade-tag {
    font-size: 0.34rem; color: #4a3010; letter-spacing: 1px;
  }
  .sum-upgrade-stack {
    font-size: 0.40rem; letter-spacing: 1px;
  }
  .sum-none {
    font-size: 0.38rem; color: #4a2e10; letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .sum-footer {
    font-size: 0.34rem; color: #3a2010; text-align: center;
    letter-spacing: 1px; margin-top: 8px;
  }

  #guideBody::-webkit-scrollbar { width:2px; }
  #guideBody::-webkit-scrollbar-track { background:#0a0400; }
  #guideBody::-webkit-scrollbar-thumb { background:#3a1e00; }

  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
</style>
</head>
<body>
<div id="gw">
  <canvas id="c" width="360" height="680"></canvas>

  <div id="ov" class="panel">
    <div id="ovTitle">HENDSBEE</div>
    <div id="ovSub"></div>
  </div>

  <div id="pause" class="panel">
    <div id="pauseTitle">PAUSED</div>
    <div id="guideBody">
      <div class="gsec-title">CELLS</div>
      <div id="tab-cells"></div>
      <div class="gsec-divider"></div>
      <div class="gsec-title">POWER-UPS</div>
      <div id="tab-powers"></div>
      <div class="gsec-divider"></div>
      <div class="gsec-title">UPGRADES</div>
      <div id="tab-upgrades"></div>
    </div>
  </div>

  <div id="settingsPanel" class="panel">
    <div style="font-family:'Press Start 2P',monospace;color:#f0a020;font-size:0.65rem;letter-spacing:2px;margin-bottom:18px;">SETTINGS</div>
    <div style="width:80%;max-width:280px;">
      <label style="font-family:'Press Start 2P',monospace;color:#f5d040;font-size:0.40rem;display:block;margin-bottom:6px;">MUSIC</label>
      <input type="range" id="sliderMusic" min="0" max="100" value="50" style="width:100%;accent-color:#f0a020;margin-bottom:16px;">
      <label style="font-family:'Press Start 2P',monospace;color:#f5d040;font-size:0.40rem;display:block;margin-bottom:6px;">SFX</label>
      <input type="range" id="sliderSfx" min="0" max="100" value="100" style="width:100%;accent-color:#f0a020;margin-bottom:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-family:'Press Start 2P',monospace;color:#f5d040;font-size:0.40rem;">SCREEN SHAKE</label>
        <button id="toggleShake" style="font-family:'Press Start 2P',monospace;font-size:0.34rem;color:#f0a020;background:rgba(240,160,32,0.15);border:1.5px solid #f0a020;border-radius:4px;padding:4px 10px;cursor:pointer;">ON</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-family:'Press Start 2P',monospace;color:#f5d040;font-size:0.40rem;">HAPTICS</label>
        <button id="toggleHaptics" style="font-family:'Press Start 2P',monospace;font-size:0.34rem;color:#f0a020;background:rgba(240,160,32,0.15);border:1.5px solid #f0a020;border-radius:4px;padding:4px 10px;cursor:pointer;">ON</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <label style="font-family:'Press Start 2P',monospace;color:#f5d040;font-size:0.40rem;">DOMINANT HEND</label>
        <button id="toggleDominant" style="font-family:'Press Start 2P',monospace;font-size:0.34rem;color:#f0a020;background:rgba(240,160,32,0.15);border:1.5px solid #f0a020;border-radius:4px;padding:4px 10px;cursor:pointer;">RIGHT</button>
      </div>
    </div>
  </div>

  <div id="shopPanel" class="panel">
    <div id="shopBody">
      <div style="font-family:'Press Start 2P',monospace;color:#f0a020;font-size:0.60rem;letter-spacing:2px;padding:10px 0 6px 0;text-align:center;">SHOP</div>

      <!-- HEND SECTION -->
      <div class="gsec-title">HEND</div>
      <div id="shopHandToggle" style="display:flex;gap:6px;justify-content:center;margin-bottom:6px;"></div>
      <div style="display:flex;justify-content:center;margin-bottom:6px;">
        <canvas id="shopHendPreview" width="120" height="90" style="border:1px solid #3a1e00;border-radius:4px;image-rendering:pixelated;"></canvas>
      </div>
      <div class="shop-dot-label">SKIN TONE</div>
      <div id="shopDotsSkin" class="shop-dots"></div>
      <div class="shop-dot-label">HEND SKIN</div>
      <div id="shopDotsHendSkin" class="shop-dots"></div>
      <div class="shop-dot-label">ACCESSORY</div>
      <div id="shopDotsAcc" class="shop-dots"></div>

      <div class="gsec-divider"></div>

      <!-- BEE + TRACER SECTION -->
      <div class="gsec-title">BEE + TRAIL</div>
      <div style="display:flex;justify-content:center;margin-bottom:6px;">
        <canvas id="shopBeePreview" width="280" height="70" style="border:1px solid #3a1e00;border-radius:4px;image-rendering:pixelated;"></canvas>
      </div>
      <div class="shop-dot-label">BEE SKIN</div>
      <div id="shopDotsBeeSkin" class="shop-dots"></div>
      <div class="shop-dot-label">TRAIL EFFECT</div>
      <div id="shopDotsTracer" class="shop-dots"></div>

    </div>
    <button id="shopBackBtn" class="ob" style="margin:4px auto 10px auto;">BACK</button>
  </div>

  <div id="summary" class="panel">
    <div id="sumTitle">HIVE CLEARED</div>
    <div id="sumLv"></div>
    <div id="sumContent"></div>
  </div>

  <div id="pu" class="panel">
    <div id="puTitle">HONEY JAR FULL</div>
    <div id="puSub">CHOOSE AN UPGRADE</div>
    <div id="puCards"></div>
  </div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// CANVAS & LAYOUT
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 360;
const aspect = Math.max(1.5, Math.min(2.2, window.innerHeight / window.innerWidth));
const H = Math.round(W * aspect);
canvas.width  = W;
canvas.height = H;

// ── Full-screen scaling ──────────────────────────────
// Dynamically sizes canvas to fill the screen aspect ratio,
// then scales the wrapper to fit the viewport.
const gw = document.getElementById('gw');
gw.style.height = H + 'px';

function scaleToFit() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / W, vh / H);
  gw.style.transform = `scale(${scale})`;
  gw.style.marginLeft = `${(vw - W * scale) / 2}px`;
  gw.style.marginTop  = `${(vh - H * scale) / 2}px`;
  // Hide decorative frame when game fills the viewport (mobile)
  const fills = (W * scale >= vw - 2) && (H * scale >= vh - 2);
  gw.style.borderColor  = fills ? 'transparent' : '';
  gw.style.outlineColor = fills ? 'transparent' : '';
  gw.style.boxShadow    = fills ? 'none' : '';
  document.body.style.display = 'block';
}

scaleToFit();
window.addEventListener('resize', scaleToFit);
screen.orientation && screen.orientation.addEventListener('change', scaleToFit);

const PLAY_BOTTOM = 0.825;               // fraction where play zone ends
const HUD_Y       = Math.round(H * PLAY_BOTTOM) + 2;   // ≈543
const PADDLE_Y    = Math.round(H * PLAY_BOTTOM) - 14;  // ≈527

// ═══════════════════════════════════════════════════════
// PALETTE
// ═══════════════════════════════════════════════════════
const PAL = {
  hexNorm:        ['#f5c030'],    // warm gold (matches guide)
  hexThick:       ['#7a4800'],    // deep bronze
  hexBrood:       ['#3a2408'],    // dark hive
  hexHoney:       ['#ffe050'],    // bright gold
  hexWax:         ['#e2d9b2'],    // warm waxy cream
  hexPortal:      ['#9020d0'],    // vivid royal purple
  hexHeavy:       ['#8a6830'],    // darker bronze
  hexRoyal:       ['#d4af37'],    // rich gold
  hexAncient:     ['#4a6050'],    // dark moss
  hexTitan:       ['#3a3a50'],    // dark steel
  hexCharged:     ['#50d0ff'],    // electric blue
  hexBomb:        ['#ff4020'],    // fiery red
  hexUnbreakable: ['#505050'],    // grey stone
  hexRoyalGuard:  ['#6a2fa0'],    // rich purple
  hexQueen:       ['#c02070'],    // deep magenta
  hexLine:  '#4a2200',       // darker outlines for contrast
  hexCrack: '#2a1000',
  hexHighlight: '#ffe880',   // inner gradient highlight
  bg:       '#080300',       // near-black cave background
  honey:    '#f5c030',
};

// Color helpers for gradient fills
function lightenCol(hex, amt) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + amt);
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + amt);
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + amt);
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function darkenCol(hex, amt) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - amt);
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - amt);
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - amt);
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

// ═══════════════════════════════════════════════════════
// CONFIG — all tunable gameplay values in one place
// ═══════════════════════════════════════════════════════
const CONFIG = {
  // Physics
  BASE_SPD:             3.6,
  MAX_SPD:              9.0,
  MIN_AXIS:             1.0,
  BLEND_F:              0.15,   // 15% raw-centre blend in hex reflection
  WALL_FRICTION:        0.82,
  SPEED_GAIN_PER_HEX:   0.12,   // speed added per 4 hexes destroyed

  // Bee
  BEE_R:                5,      // collision radius (px)
  TRAIL_LEN:            55,     // trail history length

  // Hend (Paddle)
  HEND_SPEED:           1200,   // keyboard speed (px/sec)
  HEND_COLL_H:          6,      // collision zone height (px)
  HEND_HIT_PAD_X:       6,      // hitbox X padding beyond visual paddle (px)
  HEND_HIT_PAD_Y:       4,      // hitbox Y padding above/below collision zone (px)
  HEND_TOUCH_FOLLOW:    0.38,   // touch smooth-follow factor
  HEND_VEL_BOOST:       0.28,   // paddle-velocity transfer to bee
  HEND_SPD_GAIN:        0.005,  // speed boost per unit of paddle velocity
  HEND_ANGLE_SPREAD:    45,     // base deflection half-angle (degrees)

  // Hex
  HEX_R:                18,
  HEX_COLL_RATIO:       0.90,   // effective collision = HEX_R * ratio
  PORTAL_COOLDOWN:      22,     // frames before a bee can re-use a portal

  // Honey Meter
  METER_BASE:           30,     // base cap at LV1
  METER_LEVEL_SCALE:    1.075,  // exponential per-level growth
  METER_UPGRADE_SCALE:  1.20,   // +20% cap per upgrade picked
  METER_FAST_RESET_RATE:0.08,   // fast-reset discount as fraction of base
  METER_MIN_CAP:        20,     // absolute minimum meter cap

  // Cell interactions
  WAX_DAMAGE:           1,      // splash damage dealt to neighbours on wax death

  // Brood spawn
  BROOD_MIN_BEES:       1,      // minimum bees released from brood cell
  BROOD_RAND_EXTRA:     1,      // random(0..RAND_EXTRA-1) added on top
};

// ── Derived constants (computed once from CONFIG) ─────
const BALL_R     = CONFIG.BEE_R;                           // alias used in physics/rendering
const HEX_COLL_R = CONFIG.HEX_R * CONFIG.HEX_COLL_RATIO;  // effective hex collision radius

// ═══════════════════════════════════════════════════════
// AUDIO — procedural SFX via Web Audio API
// ═══════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function acResume() { if (AC.state === 'suspended') AC.resume(); }

// iOS Safari requires AC.resume() inside a direct user gesture handler.
function _iosUnlock() {
  acResume();
  // Only do the play-pause unlock trick if music isn't already playing
  if (music.el && !music.playing) { music.el.play().then(() => { if (!music.playing) music.el.pause(); }).catch(()=>{}); }
  document.removeEventListener('touchstart', _iosUnlock, true);
  document.removeEventListener('click', _iosUnlock, true);
}
document.addEventListener('touchstart', _iosUnlock, true);
document.addEventListener('click', _iosUnlock, true);

let sfxVolume = parseFloat(localStorage.getItem('hendsbee_sfx') || '1');

let hapticsEnabled = localStorage.getItem('hendsbee_haptics') !== 'false'; // default ON
const _canVibrate = typeof navigator !== 'undefined' && typeof navigator.vibrate === 'function';
let _lastVibTime = 0;
const _VIB_THROTTLE = 30; // ms min gap between vibrations to avoid overload

/**
 * Trigger haptic feedback. Accepts a single duration (ms) or a pattern array.
 * Throttled to prevent motor overload on rapid hits.
 */
function haptic(pattern) {
  if (!hapticsEnabled || !_canVibrate) return;
  const now = performance.now();
  if (now - _lastVibTime < _VIB_THROTTLE) return;
  _lastVibTime = now;
  navigator.vibrate(pattern);
}

const SAVE_KEYS = { META: 'hendsbee_meta', RUN: 'hendsbee_run' };
const SAVE_VERSION = { META: 1, RUN: 1 };
const AUTOSAVE_INTERVAL_MS = 15000; // 15 seconds debounce

// JSON replacer/reviver for Infinity (not valid JSON)
function saveReplacer(k, v) {
  if (v === Infinity) return '__INF__';
  if (v === -Infinity) return '__NINF__';
  return v;
}
function saveReviver(k, v) {
  if (v === '__INF__') return Infinity;
  if (v === '__NINF__') return -Infinity;
  return v;
}

const SaveManager = {
  _lastAutoSave: 0,

  // ── META (permanent progression) ───────────────────────
  _defaultMeta() {
    return {
      _v: SAVE_VERSION.META,
      bestDepth: 0,
      bestLevel: 0,
      totalLifetimeHoney: 0,
      runsCompleted: 0,
      savedAt: 0
      // future: unlocked cosmetics, achievements
    };
  },

  saveMeta() {
    try {
      const meta = this.loadMeta();
      if (typeof hiveDepthMax !== 'undefined') {
        meta.bestDepth = Math.max(meta.bestDepth, hiveDepthMax || 0);
      }
      if (typeof currentLevel !== 'undefined') {
        meta.bestLevel = Math.max(meta.bestLevel, currentLevel || 0);
      }
      if (typeof lifetimeHoney !== 'undefined') {
        meta.totalLifetimeHoney = lifetimeHoney; // synced from live counter
      }
      meta.savedAt = Date.now();
      meta._v = SAVE_VERSION.META;
      localStorage.setItem(SAVE_KEYS.META, JSON.stringify(meta));
    } catch (e) { console.warn('[SaveManager] saveMeta failed:', e); }
  },

  loadMeta() {
    try {
      const raw = localStorage.getItem(SAVE_KEYS.META);
      if (!raw) return this._defaultMeta();
      const data = JSON.parse(raw);
      if (!data || typeof data._v !== 'number') return this._defaultMeta();
      if (data._v > SAVE_VERSION.META) return this._defaultMeta(); // future version
      if (data._v < SAVE_VERSION.META) this._migrateMeta(data, data._v);
      // Fill missing fields with defaults
      const def = this._defaultMeta();
      for (const k in def) {
        if (!(k in data)) data[k] = def[k];
      }
      return data;
    } catch (e) {
      console.warn('[SaveManager] loadMeta failed:', e);
      return this._defaultMeta();
    }
  },

  _migrateMeta(data, fromV) {
    // Future migrations go here:
    // if (fromV < 2) { data.newField = default; data._v = 2; }
    return data;
  },

  // ── RUN (active game state) ────────────────────────────
  saveRun() {
    // Don't save if game is over, on menu, or game hasn't started
    if (typeof gameOver !== 'undefined' && gameOver) return;
    if (typeof menuBGActive !== 'undefined' && menuBGActive) return;
    if (typeof hexes === 'undefined' || !hexes || hexes.length === 0) return;
    if (typeof bees === 'undefined' || !bees || bees.length === 0) return;

    try {
      const data = {
        _v: SAVE_VERSION.RUN,
        savedAt: Date.now(),
        // Core progress
        currentLevel, destroyed, levelHoneyEarned, upgradeCount, totalHoney,
        // Camera & generation
        scrollY, scrollYTarget, scrollYMin, generatedTop, totalDepth,
        levelSeed, portalChannelCounter, lastChargedY, hiveDepthMax,
        // Paddle
        paddleX: paddle.x,
        paddle2X: paddle2 ? paddle2.x : W * 0.6,
        // Bees
        bees: bees.map(b => ({
          x: b.x, y: b.y, vx: b.vx, vy: b.vy, speed: b.speed,
          tpCooldown: b.tpCooldown, sizeScale: b.sizeScale,
          phaseThrough: b.phaseThrough, effectTimer: b.effectTimer,
          powerupId: b.powerupId, powerupColor: b.powerupColor,
          powerupTimer: b.powerupTimer
        })),
        // Hexes — skip dead cells to save space
        hexes: hexes.filter(h => !h.dead).map(h => {
          const o = { x: h.x, y: h.y, type: h.type, hp: h.hp,
                      dead: false, flash: 0, ci: h.ci };
          if (h.portalChannel != null) o.portalChannel = h.portalChannel;
          if (h.bossGateId != null) o.bossGateId = h.bossGateId;
          return o;
        }),
        // Powers
        powers: { ...powers },
        // Powerups
        activePowerup: activePowerup ? { ...activePowerup } : null,
        hasHendOfGod,
        honeySurgeFills,
        pendingPowerupId: pendingPowerup ? pendingPowerup.id : null,
        powerupBeesRemaining,
        upgradeSlots: upgradeSlots.map(s => ({ ...s })),
        powerupDrops: powerupDrops.map(d => ({
          x: d.x, y: d.y, vy: d.vy, typeId: d.type.id, flash: d.flash
        })),
        // Timing
        tick,
        // Boss gates
        bossGates: bossGates.map(g => ({
          hp: g.hp, maxHp: g.maxHp, gateY: g.gateY, dead: g.dead
        }))
      };
      localStorage.setItem(SAVE_KEYS.RUN, JSON.stringify(data, saveReplacer));
      this._lastAutoSave = Date.now();
    } catch (e) { console.warn('[SaveManager] saveRun failed:', e); }

    // Also update meta bests
    this.saveMeta();
  },

  loadRun() {
    try {
      const raw = localStorage.getItem(SAVE_KEYS.RUN);
      if (!raw) return null;
      const data = JSON.parse(raw, saveReviver);
      if (!data || typeof data._v !== 'number') return null;
      if (data._v > SAVE_VERSION.RUN) return null; // future version — don't delete
      if (data._v < SAVE_VERSION.RUN) this._migrateRun(data, data._v);
      // Basic sanity checks
      if (!Array.isArray(data.bees) || !Array.isArray(data.hexes)) return null;
      if (data.bees.length === 0) return null;
      return data;
    } catch (e) {
      console.warn('[SaveManager] loadRun failed:', e);
      return null;
    }
  },

  _migrateRun(data, fromV) {
    // Future migrations go here:
    // if (fromV < 2) { data.newField = default; data._v = 2; }
    return data;
  },

  restoreRun() {
    const data = this.loadRun();
    if (!data) return false;

    try {
      // Core progress
      currentLevel       = data.currentLevel     ?? 1;
      destroyed          = data.destroyed         ?? 0;
      levelHoneyEarned   = data.levelHoneyEarned  ?? 0;
      upgradeCount       = data.upgradeCount      ?? 0;
      totalHoney         = data.totalHoney        ?? 0;

      // Camera & generation
      scrollY              = data.scrollY              ?? 0;
      scrollYTarget        = data.scrollYTarget        ?? 0;
      scrollYMin           = data.scrollYMin           ?? 0;
      generatedTop         = data.generatedTop         ?? 0;
      totalDepth           = data.totalDepth           ?? 0;
      levelSeed            = data.levelSeed            ?? 7919;
      portalChannelCounter = data.portalChannelCounter ?? 0;
      lastChargedY         = data.lastChargedY         ?? Infinity;
      hiveDepthMax         = data.hiveDepthMax         ?? 0;
      tick                 = data.tick                 ?? 0;

      // Paddle
      paddle = { x: data.paddleX ?? W / 2, squish: 0, prevX: data.paddleX ?? W / 2 };
      paddle2 = { x: data.paddle2X ?? W * 0.6, squish: 0, prevX: data.paddle2X ?? W * 0.6 };

      // Bees — reconstruct via mkBee then overlay saved fields
      bees = (data.bees || []).map(b => {
        const bee = mkBee(b.x, b.y, b.vx, b.vy, b.speed);
        bee.tpCooldown   = b.tpCooldown   ?? 0;
        bee.sizeScale    = b.sizeScale    ?? 1;
        bee.phaseThrough = b.phaseThrough ?? false;
        bee.effectTimer  = b.effectTimer  ?? 0;
        bee.powerupId    = b.powerupId    ?? null;
        bee.powerupColor = b.powerupColor ?? null;
        bee.powerupTimer = b.powerupTimer ?? 0;
        return bee;
      });

      // Hexes — plain objects
      hexes = (data.hexes || []).map(h => {
        const hex = { x: h.x, y: h.y, type: h.type, hp: h.hp,
                      dead: h.dead ?? false, flash: h.flash ?? 0, ci: h.ci ?? 0 };
        if (h.portalChannel != null) hex.portalChannel = h.portalChannel;
        if (h.bossGateId != null) hex.bossGateId = h.bossGateId;
        return hex;
      });

      // Boss gates — restore and re-link cells
      bossGates = (data.bossGates || []).map((g, i) => ({
        guardCells: hexes.filter(h => h.bossGateId === i && h.type === 'ROYAL_GUARD'),
        queenCells: hexes.filter(h => h.bossGateId === i && h.type === 'QUEEN'),
        hp: g.hp, maxHp: g.maxHp, gateY: g.gateY, dead: g.dead
      }));

      // Powers
      if (data.powers) {
        Object.keys(powers).forEach(k => {
          powers[k] = data.powers[k] ?? 0;
        });
      }

      // Powerups
      activePowerup        = data.activePowerup        ?? null;
      hasHendOfGod         = data.hasHendOfGod         ?? false;
      honeySurgeFills      = data.honeySurgeFills      ?? 0;
      powerupBeesRemaining = data.powerupBeesRemaining ?? 0;
      upgradeSlots         = data.upgradeSlots         ?? [];

      // Restore pendingPowerup by id lookup
      pendingPowerup = data.pendingPowerupId
        ? TEMP_POWERUPS.find(t => t.id === data.pendingPowerupId) || null
        : null;

      // Restore powerupDrops with type lookup
      powerupDrops = (data.powerupDrops || []).map(d => ({
        x: d.x, y: d.y, vy: d.vy, flash: d.flash ?? 0,
        type: TEMP_POWERUPS.find(t => t.id === d.typeId) || TEMP_POWERUPS[0]
      }));

      // Reset transient state
      gameOver            = false;
      paused              = true;
      pickerPending       = false;
      pickerTransition    = null;
      pickerResumeCallback = null;
      timeScale           = 1;
      blurAmount          = 0;
      particles           = [];
      broodMsgs           = [];
      droplets            = [];
      hendOfGodAnim       = null;
      inspectorMode       = false;
      inspectorTouchY     = null;
      touchX              = null;

      // Camera bounds
      HIVE_CONFIG.CAMERA_MIN = generatedTop - HIVE_CONFIG.CAMERA_LEAD;

      // Cancel any existing loop
      if (typeof animId !== 'undefined' && animId) cancelAnimationFrame(animId);

      // Draw one frame so pause screen shows the restored game
      music.play(); music.muffle();
      render();
      showPause();

      return true;
    } catch (e) {
      console.warn('[SaveManager] restoreRun failed:', e);
      return false;
    }
  },

  clearRun() {
    localStorage.removeItem(SAVE_KEYS.RUN);
  },

  clearAll() {
    localStorage.removeItem(SAVE_KEYS.META);
    localStorage.removeItem(SAVE_KEYS.RUN);
  },

  hasSavedRun() {
    try {
      const raw = localStorage.getItem(SAVE_KEYS.RUN);
      if (!raw) return false;
      const data = JSON.parse(raw, saveReviver);
      return !!(data && data._v && data.bees && data.hexes);
    } catch(e) { return false; }
  },

  getSummary() {
    const data = this.loadRun();
    if (!data) return { hasRun: false, level: 0, depth: 0, honey: 0, savedAt: 0 };
    return {
      hasRun: true,
      level: data.currentLevel || 1,
      depth: data.hiveDepthMax || 0,
      honey: data.totalHoney || 0,
      savedAt: data.savedAt || 0
    };
  },

  _maybeAutoSave() {
    if (Date.now() - this._lastAutoSave >= AUTOSAVE_INTERVAL_MS) {
      this.saveRun();
    }
  }
};

function _tone(freq, type, vol, dur, freqEnd) {
  if (demoMode) return; // silent during attract mode
  vol *= sfxVolume;
  acResume();
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, AC.currentTime);
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function _noise(vol, dur) {
  if (demoMode) return; // silent during attract mode
  vol *= sfxVolume;
  acResume();
  const buf = AC.createBuffer(1, Math.ceil(AC.sampleRate * dur), AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(), g = AC.createGain();
  src.buffer = buf; src.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  src.start(); src.stop(AC.currentTime + dur);
}

// MUSIC — single track with low-pass muffle filter
// ═══════════════════════════════════════════════════════
const MUSIC_PATHS = ['Music/ingame1.mp3', 'ingame1.mp3'];
const music = {
  el: null,       // Audio element
  source: null,   // MediaElementAudioSourceNode
  filter: null,   // BiquadFilterNode (lowpass)
  gain: null,     // GainNode
  playing: false,
  muffled: false,
  _fadeId: null,

  _init() {
    if (this.el) return;
    // Try each path; use first that doesn't immediately error
    this.el = new Audio(MUSIC_PATHS[0]);
    this.el.loop = true;
    let tried = 0;
    this.el.addEventListener('error', () => {
      tried++;
      if (tried < MUSIC_PATHS.length) { this.el.src = MUSIC_PATHS[tried]; }
    }, { once: false });
    // Route through Web Audio for filter control
    this.source = AC.createMediaElementSource(this.el);
    this.filter = AC.createBiquadFilter();
    this.filter.type = 'lowpass';
    this.filter.frequency.value = 22000;  // wide open = no muffle
    this.filter.Q.value = 0.7;
    this.gain = AC.createGain();
    this.gain.gain.value = musicVolume;
    this.source.connect(this.filter);
    this.filter.connect(this.gain);
    this.gain.connect(AC.destination);
  },

  play() {
    acResume();
    this._init();
    if (!this.playing) {
      this.el.play().catch(() => {});
      this.playing = true;
    }
  },

  muffle() {
    if (!this.filter) return;
    this.muffled = true;
    // Fade filter cutoff down to 400Hz over 500ms for muffled sound
    this.filter.frequency.cancelScheduledValues(AC.currentTime);
    this.filter.frequency.setValueAtTime(this.filter.frequency.value, AC.currentTime);
    this.filter.frequency.exponentialRampToValueAtTime(400, AC.currentTime + 0.5);
  },

  unmuffle() {
    if (!this.filter) return;
    this.muffled = false;
    // Fade filter cutoff back to 22kHz over 400ms
    this.filter.frequency.cancelScheduledValues(AC.currentTime);
    this.filter.frequency.setValueAtTime(this.filter.frequency.value, AC.currentTime);
    this.filter.frequency.exponentialRampToValueAtTime(22000, AC.currentTime + 0.4);
  },

  stop() {
    if (this.el) { this.el.pause(); this.el.currentTime = 0; }
    this.playing = false;
    this.muffled = false;
    if (this.filter) this.filter.frequency.value = 22000;
  }
};

function getMaxSpd() { return Math.max(4.5, CONFIG.MAX_SPD); }

function normSpd(b, tgt) {
  if (Math.abs(b.vx) < CONFIG.MIN_AXIS) b.vx = CONFIG.MIN_AXIS * Math.sign(b.vx || 1);
  if (Math.abs(b.vy) < CONFIG.MIN_AXIS) b.vy = CONFIG.MIN_AXIS * Math.sign(b.vy || -1);
  const s = Math.hypot(b.vx, b.vy);
  if (!s) { b.vx = 0; b.vy = -tgt; return; }
  const t = Math.max(CONFIG.BASE_SPD, Math.min(tgt, getMaxSpd()));
  b.vx = b.vx / s * t;
  b.vy = b.vy / s * t;
}

// ── Asset path resolver ─────────────────────────────────
// Tries local subfolder path first (dev), falls back to flat root path (GitHub Pages)
function loadImg(paths) {
  return new Promise(resolve => {
    let i = 0;
    function tryNext() {
      if (i >= paths.length) { resolve(null); return; }
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => { i++; tryNext(); };
      img.src = paths[i];
    }
    tryNext();
  });
}

function loadHendImage() {
  return loadImg(['Assets/HEND.png', 'HEND.png']).then(img => {
    if (!img) return; // fallback to pixel sprite if PNG missing
    const crop = HEND_SRC_CROP;
    const c = document.createElement('canvas');
    c.width = crop.w; c.height = crop.h;
    const x = c.getContext('2d');
    x.drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);
    const id = x.getImageData(0, 0, crop.w, crop.h);
    const d = id.data;
    // Strip bright/white background pixels only
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const brightness = (r + g + b) / 3;
      const saturation = Math.max(r, g, b) - Math.min(r, g, b);
      if (brightness > 210 && saturation < 50) {
        d[i+3] = 0;
      } else if (brightness > 185 && saturation < 40) {
        const t = (brightness - 185) / 25;
        d[i+3] = Math.round(d[i+3] * (1 - t));
      }
    }
    x.putImageData(id, 0, 0);
    hendCanvas = c;
    hendAspect = crop.w / crop.h;
    generateSkinTones();
  });
}

/**
 * Generate tinted skin-tone canvases from the base hendCanvas.
 * Maps the original peach skin tones to each SKIN_TONES entry.
 */
function generateSkinTones() {
  hendSkins = [];
  if (!hendCanvas) return;
  // Reference colors from the original Peach sprite (approximate)
  const refBase = SKIN_TONES[DEFAULT_SKIN].base;
  const refLight = SKIN_TONES[DEFAULT_SKIN].light;
  const refShadow = SKIN_TONES[DEFAULT_SKIN].shadow;

  for (const tone of SKIN_TONES) {
    const tc = document.createElement('canvas');
    tc.width = hendCanvas.width; tc.height = hendCanvas.height;
    const tx = tc.getContext('2d');
    tx.drawImage(hendCanvas, 0, 0);
    const id = tx.getImageData(0, 0, tc.width, tc.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i+3] < 10) continue; // skip transparent
      const r = d[i], g = d[i+1], b = d[i+2];
      // Classify pixel: is it skin-colored? (warm tone, not outline/dark)
      const brightness = (r + g + b) / 3;
      if (brightness < 40) continue; // outline pixels stay dark
      // Compute blend factor: how "light" vs "shadow" is this pixel?
      const t = Math.max(0, Math.min(1, (brightness - 80) / 140)); // 0=shadow, 1=light
      // Remap to target skin tone
      d[i]   = Math.round(tone.shadow[0] + (tone.light[0] - tone.shadow[0]) * t);
      d[i+1] = Math.round(tone.shadow[1] + (tone.light[1] - tone.shadow[1]) * t);
      d[i+2] = Math.round(tone.shadow[2] + (tone.light[2] - tone.shadow[2]) * t);
    }
    tx.putImageData(id, 0, 0);
    hendSkins.push(tc);
  }
}

    const ox = oc.getContext('2d');
    ox.drawImage(img, 0, 0);
    const id = ox.getImageData(0, 0, oc.width, oc.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i] > 230 && d[i+1] > 230 && d[i+2] > 230) d[i+3] = 0;

    // HI-FLIGHT is used as the body reference because it has the tapered stinger.
    // Use only the central 40% horizontal strip to find the vertical center,
    // so wing positions (which vary per frame) don't skew the alignment.
    if (!canvases[0]) return canvases;
    const w = canvases[0].width, h = canvases[0].height;
    function bodyVCenter(cv) {
      const d = cv.getContext('2d').getImageData(0, 0, w, h).data;
      // Find horizontal extent first
      let xMin = w, xMax = 0;
      for (let y = 0; y < h; y++)
        for (let x = 0; x < w; x++)
          if (d[(y * w + x) * 4 + 3] > 10) { if (x < xMin) xMin = x; if (x > xMax) xMax = x; }
      // Central 40% horizontal strip = body column (excludes wings)
      const cx = (xMin + xMax) / 2, hw = (xMax - xMin) * 0.2;
      const bLeft = Math.floor(cx - hw), bRight = Math.ceil(cx + hw);
      // Find vertical center of body column only
      let top = h, bot = 0;
      for (let y = 0; y < h; y++)
        for (let x = bLeft; x <= bRight; x++)
          if (d[(y * w + x) * 4 + 3] > 10) { if (y < top) top = y; if (y > bot) bot = y; }
      return (top + bot) / 2;

    // Convert canvases to Images
    return Promise.all(stabilised.map(cv => {
      if (!cv) return null;
      return new Promise(resolve => {
        const img2 = new Image();
        img2.onload = () => resolve(img2);
        img2.src = cv.toDataURL();
      });
    }));
  }).then(imgs => { beeFrames = imgs; });
}

// ═══════════════════════════════════════════════════════
// HONEYPOT SPRITE LOADING — empty jar + honey fill mask
// ═══════════════════════════════════════════════════════
let honeyPotEmpty = null;    // canvas: cleaned empty jar
let honeyPotFill  = null;    // canvas: honey-only pixels extrapolated to 100%
let honeyFillTop  = 0;       // Y in sprite space where 100% fill starts
let honeyFillBot  = 0;       // Y in sprite space where fill bottom is

function loadHoneypotImages() {
  const names = ['Honey_Empty.png', 'Honey_20.png'];
  return Promise.all(names.map(n => loadImg(['Assets/Honeypot/' + n, n])
  )).then(([emptyImg, fillImg]) => {
    if (!emptyImg || !fillImg) return;
    const sz = emptyImg.naturalWidth; // 1024

    // Draw both to offscreen canvases
    const eCanvas = document.createElement('canvas');
    eCanvas.width = sz; eCanvas.height = sz;
    const eCtx = eCanvas.getContext('2d');
    eCtx.drawImage(emptyImg, 0, 0);
    const eData = eCtx.getImageData(0, 0, sz, sz);

    const fCanvas = document.createElement('canvas');
    fCanvas.width = sz; fCanvas.height = sz;
    const fCtx = fCanvas.getContext('2d');
    fCtx.drawImage(fillImg, 0, 0);
    const fData = fCtx.getImageData(0, 0, sz, sz);

    // Strip white backgrounds from empty
    const ed = eData.data;
    for (let i = 0; i < ed.length; i += 4) {
      if (ed[i] > 230 && ed[i+1] > 230 && ed[i+2] > 230) ed[i+3] = 0;
    }
    eCtx.putImageData(eData, 0, 0);
    honeyPotEmpty = eCanvas;

    // Diff: find honey-only pixels and their Y range
    const fd = fData.data;
    let minHY = sz, maxHY = 0;
    // Collect average honey color
    let hR = 0, hG = 0, hB = 0, hCount = 0;
    for (let i = 0; i < fd.length; i += 4) {
      // Strip white bg from fill image too
      if (fd[i] > 230 && fd[i+1] > 230 && fd[i+2] > 230) { fd[i+3] = 0; continue; }
      // Compare with empty: if significantly different, it's honey
      const dr = fd[i] - ed[i], dg = fd[i+1] - ed[i+1], db = fd[i+2] - ed[i+2];
      const dist = Math.sqrt(dr*dr + dg*dg + db*db);
      if (dist > 30 && fd[i+3] > 100) {
        const px = (i / 4) % sz;
        const py = Math.floor((i / 4) / sz);
        if (py < minHY) minHY = py;
        if (py > maxHY) maxHY = py;
        hR += fd[i]; hG += fd[i+1]; hB += fd[i+2];
        hCount++;
      }
    }

    if (hCount === 0) return;

    // Average honey color from the 20% reference
    hR = Math.round(hR / hCount);
    hG = Math.round(hG / hCount);
    hB = Math.round(hB / hCount);

    // Find actual jar interior by scanning the empty sprite center column
    // to locate the gap between lid and body (fillable region)
    const cx = Math.floor(sz / 2);
    let jarInteriorTop = -1, jarInteriorBot = -1;
    let lidFound = false;
    for (let y = 0; y < sz; y++) {
      const idx = (y * sz + cx) * 4;
      const opaque = ed[idx + 3] > 50;
      if (!lidFound && opaque) lidFound = true;
      if (lidFound && !opaque && jarInteriorTop === -1) jarInteriorTop = y;
    }
    for (let y = sz - 1; y >= 0; y--) {
      const idx = (y * sz + cx) * 4;
      if (ed[idx + 3] > 50) { jarInteriorBot = y; break; }
    }
    // Fillable region: from just below lid gap to jar bottom
    honeyFillTop = jarInteriorTop + 10; // slight inset below lid
    honeyFillBot = jarInteriorBot - 4;  // slight inset above bottom

    // Build the full honey fill canvas
    const hCanvas = document.createElement('canvas');
    hCanvas.width = sz; hCanvas.height = sz;
    const hCtx = hCanvas.getContext('2d');

    // Create gradient fill matching the honey color
    const grad = hCtx.createLinearGradient(0, honeyFillTop, 0, honeyFillBot);
    grad.addColorStop(0, `rgb(${Math.min(255,hR+40)},${Math.min(255,hG+20)},${hB})`);
    grad.addColorStop(0.3, `rgb(${hR},${hG},${hB})`);
    grad.addColorStop(1, `rgb(${Math.max(0,hR-30)},${Math.max(0,hG-30)},${Math.max(0,hB-10)})`);

    // Fill each row within the jar interior, staying inside glass walls
    for (let y = honeyFillTop; y <= honeyFillBot; y++) {
      // Scan row for jar interior: find leftmost and rightmost opaque pixels
      let left = -1, right = -1;
      for (let x = 0; x < sz; x++) {
        const idx = (y * sz + x) * 4;
        if (ed[idx + 3] > 50) {
          if (left === -1) left = x;
          right = x;
        }
      }
      if (left >= 0 && right > left) {
        hCtx.fillStyle = grad;
        hCtx.fillRect(left + 4, y, right - left - 8, 1);
      }
    }

    // Add a surface highlight at whatever Y the fill is clipped to (drawn at runtime)
    // Store the fill canvas
    honeyPotFill = hCanvas;
  });
}

function deactivatePowerup() {

  honeySurgeFills = 0;

// Per-bee powerup IDs (applied on paddle bounce, limited to 6 bees)
const PER_BEE_POWERUPS = new Set(['beeGer','beeHemoth','booBee','beeR']);

function activatePowerup(type, px, py) {
  sfx.powerup();
  if (type.duration > 0 && PER_BEE_POWERUPS.has(type.id)) {
    // Per-bee timed — store as pending, applied on next 6 paddle bounces
    pendingPowerup = type;
    powerupBeesRemaining = 6;
  } else if (type.duration > 0) {
    // Global timed (honeySurge) — replace any existing
    activePowerup = { id: type.id, name: type.name, color: type.color, ticksLeft: type.duration };
  } else if (type.duration === -1) {
    // Stored (HEND OF GOD)
    hasHendOfGod = true;
  }
  // Instant effects dispatched here
  switch (type.id) {
    case 'beeBee': { // Split bees
      const clones = [];
      for (const b of bees) {
        b.sizeScale *= 0.7;
        const nb = mkBee(b.x, b.y, -b.vx, b.vy, b.speed);
        nb.sizeScale = b.sizeScale;
        clones.push(nb);
      }
      bees.push(...clones);
      break;
    }
    case 'beeSus': { // Divine clear — kill up to 15 cells in densest cluster
      let bestH = null, bestCount = 0;
      for (const h of hexes) {
        if (h.dead || h.type === 'PORTAL' || h.type === 'UNBREAKABLE') continue;
        let cnt = 0;
        for (const n of hexes) {
          if (!n.dead && n !== h && Math.hypot(n.x - h.x, n.y - h.y) < HEX_R * 5) cnt++;
        }
        if (cnt > bestCount) { bestCount = cnt; bestH = h; }
      }
      if (bestH) {
        let killed = 0;
        const sorted = hexes.filter(h => !h.dead && h.type !== 'PORTAL' && h.type !== 'UNBREAKABLE')
          .sort((a, b) => Math.hypot(a.x - bestH.x, a.y - bestH.y) - Math.hypot(b.x - bestH.x, b.y - bestH.y));
        for (const h of sorted) {
          if (killed >= 15) break;
          if (Math.hypot(h.x - bestH.x, h.y - bestH.y) < HEX_R * 6) {
            h.dead = true; killed++;
            spawnParts(h.x, h.y, 8, ['#f0e8a0', '#fff8d0', '#ffffff']);
            const drops = CELL_TYPES[h.type]?.honey || 0;
            for (let i = 0; i < drops; i++) spawnDroplet(h.x, h.y);
          }
        }
        /* text removed: DIVINE! */
      }
      break;
    }
    case 'beeElzebub': { // Corrupt 5-8 cells to BOMB
      const eligible = hexes.filter(h => !h.dead && !['PORTAL','UNBREAKABLE','BOMB','CHARGED'].includes(h.type));
      const count = 5 + Math.floor(Math.random() * 4);
      for (let i = 0; i < Math.min(count, eligible.length); i++) {
        const idx = Math.floor(Math.random() * eligible.length);
        const h = eligible.splice(idx, 1)[0];
        h.type = 'BOMB'; h.hp = CELL_TYPES.BOMB.hp; h.flash = 12;
        spawnParts(h.x, h.y, 6, ['#800040', '#400020', '#200010']);
      }
      /* text removed: CORRUPTED! */
      break;
    }
  }
  /* text removed: powerup name */
}

// ─── Upgrade slot tracking ────────────────────────────
// Stores up to 6 unique upgrades chosen this run (one per upgrade type).
// Each entry: { id, stacks }. New stacks go into existing entry.
let upgradeSlots = [];   // max 7 unique upgrades (one per type)

function recordUpgrade(id) {
  const existing = upgradeSlots.find(s => s.id === id);
  if (existing) {
    existing.stacks++;
  } else if (upgradeSlots.length < ALL_POWERUPS.length) {
    upgradeSlots.push({ id, stacks: 1 });
  }
}

// Pick 2 distinct random power-ups that haven't hit their max stack
function pickTwo() {
  const pool = ALL_POWERUPS.filter(p => powers[p.id] < p.max);
  if (pool.length === 0) return [];
  if (pool.length === 1) return [pool[0]];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return [pool[0], pool[1]];
}
